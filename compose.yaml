services:
  investment-team-db:
    image: agnohq/pgvector:18
    container_name: investment-team-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5433:5432"
    networks:
      - investment-team

  investment-team-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-agno-investment-team}:${IMAGE_TAG:-latest}
    container_name: investment-team-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8004:8000"
    volumes:
      # Hot-reload: mount source code
      - .:/app
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - PYTHONPATH=/app
      # Database
      - DB_HOST=investment-team-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ai}
      - DB_PASS=${DB_PASS:-ai}
      - DB_DATABASE=${DB_DATABASE:-ai}
      - WAIT_FOR_DB=True
      - PRINT_ENV_ON_LOAD=True
      # API keys
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - PARALLEL_API_KEY=${PARALLEL_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - investment-team-db
    networks:
      - investment-team
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  investment-team:

volumes:
  pgdata:
